services:
  ollama:
    image: ollama/ollama:latest
    container_name: stocks-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: stocks-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  streamlit:
    build:
      context: ./streamlit
      dockerfile: ../dockerfiles/Dockerfile.streamlit
    container_name: stocks-streamlit
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://postgres:password@pg:5432/stocks
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./streamlit:/app
    depends_on:
      - pg
      - qdrant
      - ollama
    restart: unless-stopped

  pg:
    image: postgres:14
    container_name: stocks-pg
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./pg/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  qdrant_data:
    driver: local
  pg_data:
    driver: local
