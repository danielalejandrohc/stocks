name: Save Minute Prices

on:
  schedule:
    # Once per weekday well after US market close to cover DST (22:10 UTC)
    - cron: "10 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  save-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Run price saver script
        run: |
          bash scripts/save_prices.sh

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add prices
            git commit -m "chore(prices): update minute prices [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
